name: Publish to MCP Registry

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  id-token: write   # required for GitHub OIDC auth to the MCP registry
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Authenticate (GitHub Actions OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
